<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#818cf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketForge - Marketing Campaign Orchestrator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1)}
    .gradient-text{background:linear-gradient(135deg,#ec4899,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  </style>
</head>
<body class="bg-[#0a0a0f] min-h-screen text-white">
  <header class="glass sticky top-0">
    <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-pink-500 to-orange-500 flex items-center justify-center shadow-lg">
          <i class="fas fa-bullhorn text-2xl"></i>
        </div>
        <div><h1 class="text-2xl font-bold gradient-text">MarketForge</h1><p class="text-xs text-slate-400">Campaign Orchestrator</p></div>
      </div>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-8 py-10">
    <div class="grid grid-cols-4 gap-6 mb-10">
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Active Campaigns</p><p class="text-4xl font-bold">12</p></div>
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Reach</p><p class="text-4xl font-bold text-pink-400">45K</p></div>
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Engagement</p><p class="text-4xl font-bold text-orange-400">8.2%</p></div>
      <div class="glass rounded-2xl p-6"><p class="text-slate-400 text-sm mb-2">Conversions</p><p class="text-4xl font-bold text-green-400">234</p></div>
    </div>
    <div class="grid lg:grid-cols-3 gap-8">
      <div class="glass rounded-2xl p-8">
        <h2 class="text-xl font-bold mb-6"><i class="fas fa-magic text-pink-400 mr-3"></i>Create Campaign</h2>
        <div class="space-y-4">
          <input placeholder="Campaign name..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white placeholder-slate-500">
          <select class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white">
            <option>Email</option><option>Social Media</option><option>Multi-channel</option>
          </select>
          <button class="w-full py-4 bg-gradient-to-r from-pink-500 to-orange-500 rounded-xl font-semibold"><i class="fas fa-wand-magic-sparkles mr-2"></i>Generate Content</button>
        </div>
      </div>
      <div class="col-span-2 glass rounded-2xl p-8">
        <h2 class="text-xl font-bold mb-6"><i class="fas fa-calendar text-orange-400 mr-3"></i>Scheduled Posts</h2>
        <div class="space-y-3">
          <div class="bg-white/5 rounded-xl p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-xl bg-pink-500/20 flex items-center justify-center"><i class="fas fa-envelope text-pink-400"></i></div>
              <div><p class="font-semibold">Summer Sale Launch</p><p class="text-slate-400 text-sm">Tomorrow 9AM</p></div>
            </div>
            <span class="px-3 py-1 rounded-lg text-xs bg-green-500/20 text-green-400">Ready</span>
          </div>
          <div class="bg-white/5 rounded-xl p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-xl bg-purple-500/20 flex items-center justify-center"><i class="fab fa-instagram text-purple-400"></i></div>
              <div><p class="font-semibold">Product teaser</p><p class="text-slate-400 text-sm">Today 6PM</p></div>
            </div>
            <span class="px-3 py-1 rounded-lg text-xs bg-blue-500/20 text-blue-400">Scheduled</span>
          </div>
          <div class="bg-white/5 rounded-xl p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center"><i class="fab fa-twitter text-blue-400"></i></div>
              <div><p class="font-semibold">Announcement</p><p class="text-slate-400 text-sm">Fri 12PM</p></div>
            </div>
            <span class="px-3 py-1 rounded-lg text-xs bg-yellow-500/20 text-yellow-400">Draft</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</html>
